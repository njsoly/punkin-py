[gcode_macro T0]
gcode:
	KLIPPER_LOG MSG="Ignoring T0 command"

[gcode_macro T1]
gcode:
	KLIPPER_LOG MSG="Switching to T1"
	M600

[gcode_macro T2]
gcode:
	KLIPPER_LOG MSG="Switching to T2"
	M600

[gcode_macro T3]
gcode:
	KLIPPER_LOG MSG="Switching to T3"
	M600

[gcode_macro T4]
gcode:
	KLIPPER_LOG MSG="Switching to T4"
	M600


[gcode_macro KLIPPER_LOG]
description:
	Debug a message that will actually show up in the Klipper log (as well as the main terminal console). 
	Params: MSG - the message with which to call action_respond_info()
gcode:
	{action_respond_info(
		params.MSG)}

[gcode_macro PA]
description:
	Display the current pressure advance
gcode:
	{% set PA=printer.extruder.pressure_advance | string %}
	{action_respond_info(
		'pressure advance: ' + PA)}

[gcode_macro SF]
description:
	Output the speed factor
gcode:
	{% set SF=printer['gcode_move']['speed_factor'] | string %}

	{action_respond_info(
		'speed factor: ' + SF)}

[gcode_macro RETRAX]
description:
	Shortcut to GET_RETRACTION
gcode:
	GET_RETRACTION


[gcode_macro SET_MATERIAL_PLA]
gcode:
	KLIPPER_LOG MSG="SET_MATERIAL_PLA placeholder called."

[gcode_macro SET_MATERIAL_PETG]
gcode:
	KLIPPER_LOG MSG="SET_MATERIAL_PETG placeholder called."

[gcode_macro SET_MATERIAL_TPU]
gcode:
	KLIPPER_LOG MSG="SET_MATERIAL_TPU placeholder called."

